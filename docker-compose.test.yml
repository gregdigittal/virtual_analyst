version: "3.8"

# Isolated test database — does NOT interfere with dev DB on port 5432.
# Usage: docker compose -f docker-compose.test.yml up -d --wait

services:
  postgres-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: finmodel_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finmodel_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data
