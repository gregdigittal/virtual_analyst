<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=Edge"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Virtual Analyst Live Links</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
  <div id="app">
    <h2>Virtual Analyst</h2>
    <p>Configure API and connection to pull/push data.</p>
    <div>
      <label>API base URL:</label>
      <input type="text" id="apiUrl" placeholder="https://localhost:8000/api/v1" style="width:100%;margin:4px 0;"/>
    </div>
    <div>
      <label>Tenant ID:</label>
      <input type="text" id="tenantId" placeholder="X-Tenant-ID" style="width:100%;margin:4px 0;"/>
    </div>
    <div>
      <label>Access token (optional):</label>
      <input type="password" id="accessToken" placeholder="Bearer token for API auth" style="width:100%;margin:4px 0;"/>
    </div>
    <div>
      <label>Connection ID:</label>
      <input type="text" id="connectionId" placeholder="ex_xxxx" style="width:100%;margin:4px 0;"/>
    </div>
    <button id="btnPull" style="margin:8px 4px 0 0;">Pull</button>
    <button id="btnPush" style="margin:8px 4px 0 0;">Push</button>
    <pre id="status" style="font-size:12px;margin-top:12px;white-space:pre-wrap;"></pre>
  </div>
  <script src="taskpane.js"></script>
</body>
</html>
