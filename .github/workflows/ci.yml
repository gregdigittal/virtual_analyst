name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Format check with black
        run: black --check .

      - name: Type check with mypy
        run: mypy apps/ shared/

      - name: Security scan (Safety)
        run: safety check --json

      - name: Dependency audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --strict

      - name: Run tests
        run: pytest tests/unit/ tests/golden/ -v --tb=short --cov=apps --cov=shared --cov-report=term
        env:
          ENVIRONMENT: test

  frontend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Dependency audit
        run: npm audit --audit-level=high

  integration-tests:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: finmodel_test
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d finmodel_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finmodel_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"

      - name: Apply migrations
        run: |
          psql "$DATABASE_URL" -f apps/api/app/db/migrations/0001_init.sql -q
          psql "$DATABASE_URL" -f apps/api/app/db/migrations/0002_functions_and_rls.sql -q
          for f in apps/api/app/db/migrations/00[0-9][0-9]_*.sql; do
            num="$(basename "$f" | cut -d_ -f1)"
            if [ "$num" -le 2 ]; then continue; fi
            psql "$DATABASE_URL" -f "$f" -q
          done

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short
        env:
          INTEGRATION_TESTS: '1'

  build:
    needs: [test, frontend-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t virtual-analyst/api:${{ github.sha }} .

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: virtual-analyst/api:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table
