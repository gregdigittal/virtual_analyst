name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Format check with black
        run: black --check .

      - name: Type check with mypy
        run: mypy apps/ shared/

      - name: Security scan (Safety)
        run: safety check --json

      - name: Run tests
        run: pytest tests/unit/ tests/golden/ -v --tb=short --cov=apps --cov=shared --cov-report=term
        env:
          ENVIRONMENT: test

  integration-tests:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - run: pytest tests/integration/ -v --tb=short
        env:
          INTEGRATION_TESTS: '1'
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t virtual-analyst/api:${{ github.sha }} .

      - name: Scan image for vulnerabilities
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy image virtual-analyst/api:${{ github.sha }}
