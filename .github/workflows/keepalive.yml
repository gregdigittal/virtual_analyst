name: Keepalive

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    if: ${{ secrets.HOSTED_API_URL != '' }}

    steps:
      - name: Ping health endpoint
        run: |
          curl -sf "${{ secrets.HOSTED_API_URL }}/api/v1/health/live" || true
