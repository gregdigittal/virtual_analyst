services:
  - type: web
    name: virtual-analyst-api
    runtime: python
    pythonVersion: "3.12.0"
    plan: free
    region: oregon
    buildCommand: pip install .
    startCommand: uvicorn apps.api.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: ""
      - key: SENTRY_DSN
        sync: false
